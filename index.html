<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Egzagon Memwa Premium</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:
    radial-gradient(circle at top,#1b1b1b,#050505);
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    overflow:hidden;
    padding:10px;
}

h1{
    color:#00e5ff;
    margin-bottom:10px;
    font-size:2rem;
    text-shadow:0 0 10px rgba(0,229,255,0.5);
}

.scoreboard{
    display:flex;
    gap:15px;
    margin-bottom:15px;
}

.score-box{
    background:#111;
    padding:10px 18px;
    border-radius:20px;
    border:1px solid rgba(255,255,255,0.1);
    font-weight:bold;
    box-shadow:0 0 10px rgba(0,0,0,0.5);
}

#kredi-display{
    color:#4caf50;
}

#pè-display{
    color:#00e5ff;
}

#status{
    margin-bottom:15px;
    font-weight:bold;
    color:#ffeb3b;
    text-align:center;
    min-height:24px;
}

/* HONEYCOMB */

.honeycomb{
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
    border-radius:25px;
    background:rgba(255,255,255,0.03);
    box-shadow:
    inset 0 0 20px rgba(0,0,0,0.8),
    0 0 20px rgba(0,0,0,0.5);
}

.row{
    display:flex;
    justify-content:center;
    margin-top:-12px;
}

.hexagon{
    width:60px;
    height:68px;
    margin:0 3px;
    background:linear-gradient(145deg,#3a3a3a,#1d1d1d);
    clip-path:polygon(
        50% 0%,
        100% 25%,
        100% 75%,
        50% 100%,
        0% 75%,
        0% 25%
    );

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:1.3rem;
    font-weight:bold;
    color:transparent;

    cursor:pointer;
    transition:0.2s;
    box-shadow:
    0 5px 10px rgba(0,0,0,0.5);
}

.hexagon:hover{
    transform:translateY(-3px);
}

.hexagon:active{
    transform:scale(0.92);
}

.hexagon.flipped{
    color:white !important;
    background:
    linear-gradient(
        145deg,
        var(--light),
        var(--dark)
    ) !important;
}

.hexagon.matched{
    pointer-events:none;
    color:white !important;
    background:
    linear-gradient(
        145deg,
        var(--light),
        var(--dark)
    ) !important;

    box-shadow:
    0 0 15px var(--dark);
}

.hexagon.wrong{
    background:
    linear-gradient(145deg,#ff5252,#c62828) !important;
    color:white !important;
    animation:shake .3s;
}

/* COLORS */

.hexagon[data-value="10"]{
    --dark:#00bcd4;
    --light:#4dd0e1;
}

.hexagon[data-value="11"]{
    --dark:#ff9800;
    --light:#ffb74d;
}

.hexagon[data-value="12"]{
    --dark:#7b1fa2;
    --light:#ba68c8;
}

.hexagon[data-value="13"]{
    --dark:#e91e63;
    --light:#f06292;
}

.hexagon[data-value="14"]{
    --dark:#2e7d32;
    --light:#66bb6a;
}

.hexagon[data-value="15"]{
    --dark:#9c27b0;
    --light:#ce93d8;
}

.hexagon[data-value="16"]{
    --dark:#fdd835;
    --light:#fff176;
    color:black !important;
}

.hexagon[data-value="17"]{
    --dark:#03a9f4;
    --light:#81d4fa;
}

.hexagon[data-value="18"]{
    --dark:#ff5722;
    --light:#ff8a65;
}

.hexagon[data-value="19"]{
    --dark:#009688;
    --light:#4db6ac;
}

/* BUTTON */

.btn-restart{
    margin-top:25px;
    padding:12px 25px;
    border:none;
    border-radius:15px;
    background:linear-gradient(145deg,#00e5ff,#00bcd4);
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

.btn-restart:hover{
    transform:scale(1.05);
}

/* MODAL */

.modal{
    position:fixed;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    backdrop-filter:blur(8px);

    display:flex;
    justify-content:center;
    align-items:center;

    z-index:999;
}

.modal-content{
    width:90%;
    max-width:320px;
    padding:30px 20px;

    border-radius:25px;

    background:
    linear-gradient(145deg,#101010,#1f1f1f);

    border:2px solid #00e5ff;

    text-align:center;

    box-shadow:
    0 0 25px rgba(0,229,255,0.4);

    animation:popup .4s;
}

.coin{
    font-size:4rem;
    margin-bottom:10px;
    animation:bounce 1.5s infinite;
}

.modal h2{
    color:#00e5ff;
    margin-bottom:10px;
}

.modal p{
    line-height:1.5;
    margin-bottom:15px;
}

.price{
    color:#4caf50;
    font-size:1.5rem;
    font-weight:bold;
}

.reward{
    background:rgba(255,255,255,0.05);
    padding:12px;
    border-radius:12px;
    margin-bottom:20px;
    color:gold;
}

.btn-pay{
    width:100%;
    padding:14px;
    border:none;
    border-radius:15px;

    background:
    linear-gradient(145deg,#00e676,#00c853);

    color:white;
    font-weight:bold;
    font-size:1rem;

    cursor:pointer;

    transition:.3s;

    animation:pulse 1.5s infinite;
}

.btn-pay:hover{
    transform:scale(1.05);
}

/* ANIMATIONS */

@keyframes popup{
    from{
        opacity:0;
        transform:scale(.6);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

@keyframes bounce{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-8px);
    }
}

@keyframes pulse{
    0%{
        box-shadow:0 0 0 0 rgba(0,230,118,.7);
    }
    70%{
        box-shadow:0 0 0 15px rgba(0,230,118,0);
    }
    100%{
        box-shadow:0 0 0 0 rgba(0,230,118,0);
    }
}

@keyframes shake{
    0%,100%{
        transform:translateX(0);
    }
    25%{
        transform:translateX(-5px);
    }
    75%{
        transform:translateX(5px);
    }
}

</style>
</head>

<body>

<h1>🎮 Egzagon Memwa</h1>

<div class="scoreboard">

    <div class="score-box">
        Pwi:
        <span id="kredi-display">500 Goud</span>
    </div>

    <div class="score-box">
        Pè:
        <span id="pè-display">0 / 3</span>
    </div>

</div>

<div id="status">
    Konfime peman an pou jwe
</div>

<div class="honeycomb" id="honeycomb"></div>

<button class="btn-restart" onclick="showPayment()">
    🔄 Reyi Jwe
</button>

<!-- MODAL -->

<div class="modal" id="paymentModal">

    <div class="modal-content">

        <div class="coin">💰</div>

        <h2>Antre nan jwèt la</h2>

        <p>
            Pou kòmanse jwèt la,
            ou bezwen peye
            <span class="price">5 Goud</span>
        </p>

        <div class="reward">
            🏆 Rekonpans:
            <strong>500 Goud</strong>
        </div>

        <button class="btn-pay" onclick="startGame()">
            ✅ Wi, Peye 5 Goud
        </button>

    </div>

</div>

<script>

const itemValues = [
10,10,
11,11,
12,12,
13,13,
14,14,
15,15,
16,16,
17,17,
18,18,
19,19
];

let firstCard = null;
let secondCard = null;
let lockBoard = true;
let matchesFound = 0;

const honeycomb =
document.getElementById("honeycomb");

const statusText =
document.getElementById("status");

const paymentModal =
document.getElementById("paymentModal");

const krediDisplay =
document.getElementById("kredi-display");

const pèDisplay =
document.getElementById("pè-display");

/* SHUFFLE */

function shuffle(array){
    return array.sort(
        ()=>Math.random()-0.5
    );
}

/* SHOW PAYMENT */

function showPayment(){

    paymentModal.style.display="flex";

    lockBoard=true;

    statusText.innerText=
    "Konfime peman an pou jwe";

}

/* START GAME */

function startGame(){

    let audio =
    new Audio(
    "https://assets.mixkit.co/sfx/preview/mixkit-unlock-game-notification-253.mp3"
    );

    audio.play();

    paymentModal.style.display="none";

    lockBoard=false;

    initGame();

}

/* INIT GAME */

function initGame(){

    honeycomb.innerHTML="";

    firstCard=null;
    secondCard=null;

    matchesFound=0;

    pèDisplay.innerText="0 / 3";

    krediDisplay.innerText=
    "500 Goud";

    krediDisplay.style.color=
    "#4caf50";

    statusText.innerText=
    "🎯 Jwenn 3 pè san fè erè";

    statusText.style.color=
    "#ffeb3b";

    const shuffled =
    shuffle([...itemValues]);

    const rowSizes =
    [3,4,5,5,3];

    let index=0;

    rowSizes.forEach(size=>{

        const row =
        document.createElement("div");

        row.classList.add("row");

        for(let i=0;i<size;i++){

            const value =
            shuffled[index];

            const hex =
            document.createElement("div");

            hex.classList.add("hexagon");

            hex.dataset.value=value;

            hex.innerText=value;

            hex.addEventListener(
                "click",
                flipCard
            );

            row.appendChild(hex);

            index++;

        }

        honeycomb.appendChild(row);

    });

}

/* FLIP */

function flipCard(){

    if(lockBoard) return;

    if(this===firstCard) return;

    this.classList.add("flipped");

    if(!firstCard){

        firstCard=this;

        return;

    }

    secondCard=this;

    lockBoard=true;

    checkMatch();

}

/* CHECK */

function checkMatch(){

    let isMatch =
    firstCard.dataset.value===
    secondCard.dataset.value;

    if(isMatch){

        disableCards();

    }else{

        gameOver();

    }

}

/* MATCH */

function disableCards(){

    firstCard.classList.add("matched");

    secondCard.classList.add("matched");

    matchesFound+=2;

    let pairs=
    matchesFound/2;

    pèDisplay.innerText=
    `${pairs} / 3`;

    if(pairs===3){

        statusText.innerText=
        "🏆 Felisitasyon! Ou genyen 500 Goud!";

        statusText.style.color=
        "#00e676";

        lockBoard=true;

    }else{

        resetBoard();

    }

}

/* GAME OVER */

function gameOver(){

    statusText.innerText=
    "❌ Ou pèdi jwèt la";

    statusText.style.color=
    "#ff5252";

    krediDisplay.innerText=
    "0 Goud";

    krediDisplay.style.color=
    "#ff5252";

    firstCard.classList.add("wrong");

    secondCard.classList.add("wrong");

}

/* RESET */
