<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Egzagon Memwa PRO MAX</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:
linear-gradient(-45deg,#000,#07131d,#00141a,#000);
background-size:400% 400%;
animation:bgmove 10s ease infinite;
font-family:Arial,sans-serif;
color:white;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
overflow:hidden;
padding:10px;
}

@keyframes bgmove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

h1{
font-size:2rem;
margin-bottom:10px;
color:#00e5ff;
text-shadow:0 0 20px #00e5ff;
text-align:center;
}

.scoreboard{
display:flex;
gap:15px;
margin-bottom:15px;
flex-wrap:wrap;
justify-content:center;
}

.score-box{
background:#111;
padding:12px 20px;
border-radius:20px;
border:1px solid #00e5ff;
box-shadow:0 0 15px rgba(0,229,255,0.4);
font-weight:bold;
}

#status{
margin-bottom:20px;
font-weight:bold;
font-size:1rem;
text-align:center;
color:#fff176;
min-height:30px;
padding:0 10px;
}

.honeycomb{
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
border-radius:25px;
background:rgba(255,255,255,0.03);
backdrop-filter:blur(6px);
box-shadow:0 0 40px rgba(0,229,255,0.15);
}

.row{
display:flex;
margin-top:-12px;
}

.hexagon{
width:65px;
height:74px;
margin:3px;
clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
background:linear-gradient(145deg,#222,#000);
display:flex;
justify-content:center;
align-items:center;
font-size:1.5rem;
font-weight:bold;
color:white;
cursor:pointer;
transition:0.3s;
position:relative;
transform-style:preserve-3d;
box-shadow:
0 0 10px rgba(0,0,0,0.5),
inset 0 0 10px rgba(255,255,255,0.05);
user-select:none;
}

.hexagon:hover{
transform:scale(1.05);
}

.hexagon.flipped{
animation:flip 0.4s;
}

@keyframes flip{
0%{transform:rotateY(0deg);}
100%{transform:rotateY(180deg);}
}

.hexagon.matched{
animation:glow 1s infinite alternate;
pointer-events:none;
}

@keyframes glow{
from{
box-shadow:0 0 10px #00ff99;
}
to{
box-shadow:0 0 25px #00ff99;
}
}

.hexagon.wrong{
background:#ff1744 !important;
animation:shake 0.3s;
}

@keyframes shake{
0%,100%{transform:translateX(0);}
25%{transform:translateX(-5px);}
75%{transform:translateX(5px);}
}

.btn-restart{
margin-top:25px;
padding:12px 30px;
border:none;
border-radius:10px;
background:#00e5ff;
color:black;
font-weight:bold;
font-size:1rem;
cursor:pointer;
box-shadow:0 0 15px #00e5ff;
transition:0.3s;
}

.btn-restart:hover{
transform:scale(1.05);
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.88);
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

.modal-content{
background:#111;
padding:30px;
border-radius:20px;
text-align:center;
width:90%;
max-width:350px;
border:2px solid #00e5ff;
box-shadow:0 0 30px rgba(0,229,255,0.5);
animation:pop 0.4s;
}

@keyframes pop{
0%{transform:scale(0.5);}
100%{transform:scale(1);}
}

.modal-content h2{
margin-bottom:15px;
color:#00e5ff;
}

.modal-content p{
margin-bottom:20px;
line-height:1.6;
}

.btn-pay{
padding:12px 30px;
border:none;
border-radius:10px;
background:#00ff99;
color:black;
font-size:1rem;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 15px #00ff99;
}

.win{
color:#00ff99 !important;
}

.lose{
color:#ff1744 !important;
}

</style>
</head>

<body>

<h1>🔥 Egzagon Memwa PRO MAX 🔥</h1>

<div class="scoreboard">

<div class="score-box">
💰 Pwi:
<span id="kredi-display">500 Goud</span>
</div>

<div class="score-box">
🏆 Pè:
<span id="pè-display">0 / 3</span>
</div>

<div class="score-box">
❌ Erè:
<span id="error-display">0 / 2</span>
</div>

</div>

<div id="status">
Konfime peman pou kòmanse jwèt la
</div>

<div class="honeycomb" id="honeycomb"></div>

<button class="btn-restart" onclick="showPayment()">
🔄 Rekòmanse
</button>

<!-- MODAL -->

<div class="modal" id="paymentModal">

<div class="modal-content">

<h2>💎 Peman Obligatwa</h2>

<p>
Peye <b>5 Goud</b> pou antre nan jwèt la.<br><br>

Jwenn <b>3 pè</b> san plis pase 2 erè
pou genyen <b>500 Goud</b> 🏆
</p>

<button class="btn-pay" onclick="payNow()">
Peye 5 Goud
</button>

</div>
</div>

<!-- AUDIO -->

<audio id="clickSound">
<source src="https://assets.mixkit.co/sfx/preview/mixkit-select-click-1109.mp3">
</audio>

<audio id="winSound">
<source src="https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3">
</audio>

<audio id="loseSound">
<source src="https://assets.mixkit.co/sfx/preview/mixkit-player-losing-or-failing-2042.mp3">
</audio>

<script>

const values = [
10,10,
11,11,
12,12,
13,13,
14,14,
15,15,
16,16,
17,17,
18,18,
19,19
];

const honeycomb = document.getElementById("honeycomb");
const statusText = document.getElementById("status");
const paymentModal = document.getElementById("paymentModal");

const krediDisplay = document.getElementById("kredi-display");
const pairDisplay = document.getElementById("pè-display");
const errorDisplay = document.getElementById("error-display");

const clickSound = document.getElementById("clickSound");
const winSound = document.getElementById("winSound");
const loseSound = document.getElementById("loseSound");

let firstCard = null;
let secondCard = null;
let lockBoard = true;

let pairs = 0;
let errors = 0;

/* MELANJ PRO */

function hardcoreShuffle(array){

for(let i=array.length-1;i>0;i--){

const j=Math.floor(Math.random()*(i+1));

[array[i],array[j]]=[array[j],array[i]];

}

/* EVITE PÈ YO PRE */

for(let i=0;i<array.length-1;i++){

if(array[i]===array[i+1]){

let swapIndex=(i+4)%array.length;

[array[i+1],array[swapIndex]]=
[array[swapIndex],array[i+1]];

}

}

return array;

}

function showPayment(){

paymentModal.style.display="flex";
lockBoard=true;

}

function payNow(){

paymentModal.style.display="none";

statusText.innerHTML="🔥 Jwèt la kòmanse!";
statusText.className="";

lockBoard=false;

initGame();

}

function initGame(){

honeycomb.innerHTML="";

firstCard=null;
secondCard=null;

pairs=0;
errors=0;

pairDisplay.innerHTML="0 / 3";
errorDisplay.innerHTML="0 / 2";

krediDisplay.innerHTML="500 Goud";

const shuffled =
hardcoreShuffle([...values]);

const rows=[3,4,5,5,3];

let index=0;

rows.forEach(size=>{

const row=document.createElement("div");

row.classList.add("row");

for(let i=0;i<size;i++){

const value=shuffled[index];

const hex=document.createElement("div");

hex.classList.add("hexagon");

hex.dataset.value=value;
hex.dataset.real=value;

/* KACHE NIMEWO YO */

hex.innerHTML="?";

hex.addEventListener("click",flipCard);

row.appendChild(hex);

index++;

}

honeycomb.appendChild(row);

});

}

function flipCard(){

if(lockBoard) return;

if(this===firstCard) return;

clickSound.play();

this.innerHTML=this.dataset.real;

this.classList.add("flipped");

if(!firstCard){

firstCard=this;
return;

}

secondCard=this;

lockBoard=true;

checkMatch();

}

function checkMatch(){

const match =
firstCard.dataset.real===
secondCard.dataset.real;

if(match){

firstCard.classList.add("matched");
secondCard.classList.add("matched");

pairs++;

pairDisplay.innerHTML=
pairs+" / 3";

statusText.innerHTML=
"✅ Bon pè! Kontinye...";

resetBoard();

/* GENYEN */

if(pairs===3){

statusText.innerHTML=
"🏆 Ou genyen 500 Goud!";

statusText.className="win";

winSound.play();

lockBoard=true;

}

}else{

errors++;

errorDisplay.innerHTML=
errors+" / 2";

firstCard.classList.add("wrong");
secondCard.classList.add("wrong");

setTimeout(()=>{

firstCard.classList.remove("flipped","wrong");
secondCard.classList.remove("flipped","wrong");

firstCard.innerHTML="?";
secondCard.innerHTML="?";

resetBoard();

},900);

/* PÈDI */

if(errors>=2){

statusText.innerHTML=
"❌ Ou pèdi jwèt la";

statusText.className="lose";

krediDisplay.innerHTML="0 Goud";

loseSound.play();

lockBoard=true;

}

}

}

function resetBoard(){

[firstCard,secondCard]=[null,null];

if(errors<2 && pairs<3){

lockBoard=false;

}

}

showPayment();

</script>

</body>
</html>
