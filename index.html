<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🔥 Egzagon Jwèt PRO 🔥</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:15px;
overflow:hidden;

background:
linear-gradient(-45deg,
#000,
#04131f,
#12001f,
#001d1d,
#000);

background-size:400% 400%;
animation:bg 12s ease infinite;
color:white;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* CONTAINER */

.container{
width:100%;
display:flex;
justify-content:center;
align-items:center;
}

/* SURFACE */

.surface{

width:100%;
max-width:420px;

padding:25px;

border-radius:30px;

background:
rgba(255,255,255,0.06);

backdrop-filter:blur(15px);

border:
1px solid rgba(255,255,255,0.1);

box-shadow:
0 0 30px rgba(0,255,255,0.2),
inset 0 0 20px rgba(255,255,255,0.04);

display:flex;
flex-direction:column;
align-items:center;

position:relative;
overflow:hidden;

}

/* TITLE */

.title{
font-size:2rem;
margin-bottom:20px;
text-align:center;

color:#00f7ff;

text-shadow:
0 0 10px #00f7ff,
0 0 25px #00f7ff;

animation:glow 2s infinite alternate;
}

@keyframes glow{
from{
transform:scale(1);
}
to{
transform:scale(1.04);
}
}

/* SCORE */

.scoreboard{
display:flex;
gap:15px;
flex-wrap:wrap;
justify-content:center;
margin-bottom:20px;
}

.score{
padding:12px 18px;

border-radius:15px;

background:
rgba(255,255,255,0.07);

border:
1px solid rgba(0,255,255,0.3);

box-shadow:
0 0 15px rgba(0,255,255,0.1);

font-weight:bold;
font-size:0.95rem;
}

/* STATUS */

#status{
margin-bottom:20px;
font-size:1rem;
font-weight:bold;
text-align:center;
color:#fff176;
min-height:25px;
}

/* BOARD */

.board{
display:flex;
justify-content:center;
align-items:center;
flex-wrap:wrap;
gap:15px;
margin-top:10px;
}

/* HEXAGON */

.hex{

width:95px;
height:105px;

clip-path:polygon(
50% 0%,
100% 25%,
100% 75%,
50% 100%,
0% 75%,
0% 25%
);

display:flex;
justify-content:center;
align-items:center;

font-size:2rem;
font-weight:bold;

cursor:pointer;
user-select:none;

transition:0.3s;

position:relative;

background-size:300% 300%;
animation:flow 5s ease infinite;

box-shadow:
0 0 20px rgba(0,0,0,0.5),
0 0 15px rgba(255,255,255,0.08),
inset 0 0 15px rgba(255,255,255,0.05);

}

/* COLORS */

.hex:nth-child(1){
background:
linear-gradient(-45deg,
#ff1744,
#ff9100,
#ffea00);
}

.hex:nth-child(2){
background:
linear-gradient(-45deg,
#00e5ff,
#2979ff,
#651fff);
}

.hex:nth-child(3){
background:
linear-gradient(-45deg,
#00ff99,
#00c853,
#64dd17);
}

.hex:nth-child(4){
background:
linear-gradient(-45deg,
#ff00ff,
#d500f9,
#651fff);
}

@keyframes flow{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.hex:hover{
transform:
scale(1.08)
rotate(2deg);

box-shadow:
0 0 20px #00e5ff,
0 0 40px rgba(255,255,255,0.2);
}

.hex.flip{
animation:flip 0.4s;
}

@keyframes flip{
0%{
transform:rotateY(0deg);
}
100%{
transform:rotateY(180deg);
}
}

.hex.match{
animation:matchGlow 1s infinite alternate;
pointer-events:none;
}

@keyframes matchGlow{
from{
box-shadow:0 0 10px #00ff99;
}
to{
box-shadow:0 0 30px #00ff99;
}
}

.hex.wrong{
background:#ff1744 !important;
animation:shake 0.3s;
}

@keyframes shake{
0%,100%{
transform:translateX(0);
}
25%{
transform:translateX(-5px);
}
75%{
transform:translateX(5px);
}
}

/* BUTTON */

button{
margin-top:25px;

padding:14px 30px;

border:none;
border-radius:15px;

background:
linear-gradient(45deg,
#00e5ff,
#00b0ff);

color:black;

font-size:1rem;
font-weight:bold;

cursor:pointer;

transition:0.3s;

box-shadow:
0 0 20px rgba(0,229,255,0.4);
}

button:hover{
transform:scale(1.05);
}

/* DIALOG */

.dialog{

position:fixed;
inset:0;

background:
rgba(0,0,0,0.8);

display:flex;
justify-content:center;
align-items:center;

z-index:999;
}

.dialog-box{

width:90%;
max-width:350px;

padding:25px;

border-radius:25px;

background:
rgba(10,10,20,0.95);

border:
1px solid rgba(0,255,255,0.2);

box-shadow:
0 0 30px rgba(0,255,255,0.3);

text-align:center;

animation:pop 0.4s ease;
}

@keyframes pop{
from{
transform:scale(0.7);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

.dialog-box h2{
margin-bottom:15px;
color:#00e5ff;
}

.dialog-box p{
margin-bottom:20px;
line-height:1.5;
}

.dialog-buttons{
display:flex;
gap:15px;
justify-content:center;
}

.payBtn{
background:#00ff99;
}

.cancelBtn{
background:#ff5252;
color:white;
}

.win{
color:#00ff99 !important;
}

.lose{
color:#ff5252 !important;
}

/* MOBILE */

@media(max-width:600px){

.surface{
max-width:360px;
padding:20px;
}

.hex{
width:78px;
height:88px;
font-size:1.5rem;
}

.title{
font-size:1.6rem;
}

}

</style>
</head>

<body>

<div class="container">

<div class="surface">

<div class="title">
🔥 EGZAGON JWÈT 🔥
</div>

<div class="scoreboard">

<div class="score">
💸 Pri: 5 Goud
</div>

<div class="score">
🏆 Rekonpans: 15 Goud
</div>

</div>

<div id="status">
Peye 5 goud avan ou jwe 🔥
</div>

<div class="board" id="board"></div>

<button onclick="restartGame()">
🔄 Rekòmanse
</button>

</div>

</div>

<!-- DIALOG -->

<div class="dialog" id="payDialog">

<div class="dialog-box">

<h2>💰 Peman Obligatwa</h2>

<p>
Pou kòmanse jwèt la,
ou dwe peye <b>5 Goud</b>.
</p>

<div class="dialog-buttons">

<button class="payBtn" onclick="payNow()">
💸 Peye
</button>

<button class="cancelBtn">
❌ Fèmen
</button>

</div>

</div>

</div>

<!-- AUDIO -->

<audio id="clickSound">
<source src="https://assets.mixkit.co/sfx/preview/mixkit-select-click-1109.mp3">
</audio>

<audio id="winSound">
<source src="https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3">
</audio>

<audio id="loseSound">
<source src="https://assets.mixkit.co/sfx/preview/mixkit-player-losing-or-failing-2042.mp3">
</audio>

<script>

const board =
document.getElementById("board");

const statusText =
document.getElementById("status");

const dialog =
document.getElementById("payDialog");

const clickSound =
document.getElementById("clickSound");

const winSound =
document.getElementById("winSound");

const loseSound =
document.getElementById("loseSound");

let gameStarted = false;

let firstCard = null;
let secondCard = null;

let lock = false;

let found = 0;

const values = [
1,1,2,2
];

/* SHUFFLE */

function shuffle(array){

for(let i=array.length-1;i>0;i--){

const j =
Math.floor(Math.random()*(i+1));

[array[i],array[j]] =
[array[j],array[i]];

}

return array;

}

/* CREATE BOARD */

function createBoard(){

board.innerHTML = "";

const shuffled =
shuffle([...values]);

shuffled.forEach(value=>{

const hex =
document.createElement("div");

hex.classList.add("hex");

hex.dataset.value = value;

hex.innerHTML = "?";

hex.addEventListener(
"click",
flipCard
);

board.appendChild(hex);

});

}

/* PAYMENT */

function payNow(){

dialog.style.display = "none";

gameStarted = true;

statusText.innerHTML =
"🔥 Chwazi 2 pè yo";

}

/* FLIP */

function flipCard(){

if(!gameStarted) return;

if(lock) return;

if(this === firstCard) return;

clickSound.play();

this.innerHTML =
this.dataset.value;

this.classList.add("flip");

if(!firstCard){

firstCard = this;

return;

}

secondCard = this;

lock = true;

checkResult();

}

/* CHECK */

function checkResult(){

const same =
firstCard.dataset.value ===
secondCard.dataset.value;

if(same){

firstCard.classList.add("match");
secondCard.classList.add("match");

found++;

statusText.innerHTML =
"🔥 Bon chwa";

resetCards();

if(found >= 2){

statusText.innerHTML =
"🏆 Ou genyen 15 Goud!";

statusText.className =
"win";

winSound.play();

lock = true;

}

}else{

firstCard.classList.add("wrong");
secondCard.classList.add("wrong");

setTimeout(()=>{

loseGame();

},800);

}

}

/* LOSE */

function loseGame(){

loseSound.play();

statusText.innerHTML =
"❌ Ou pèdi jwèt la";

statusText.className =
"lose";

const cards =
document.querySelectorAll(".hex");

cards.forEach(card=>{

card.innerHTML =
card.dataset.value;

});

lock = true;

}

/* RESET */

function resetCards(){

[firstCard,secondCard] =
[null,null];

lock = false;

}

/* RESTART */

function restartGame(){

found = 0;

statusText.innerHTML =
"Peye 5 goud avan ou jwe 🔥";

statusText.className = "";

gameStarted = false;

lock = false;

firstCard = null;
secondCard = null;

dialog.style.display =
"flex";

createBoard();

}

createBoard();

</script>

</body>
</html>
