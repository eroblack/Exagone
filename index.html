<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gwo Egzagon Memwa</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
        }

        h1 {
            margin: 0 0 5px 0;
            color: #00bcd4;
            font-size: 1.5rem;
            text-align: center;
        }

        #status {
            font-size: 1rem;
            margin-bottom: 15px;
            font-weight: bold;
            color: #ffeb3b;
            text-align: center;
            min-height: 24px;
            padding: 0 10px;
        }

        /* Veso prensipal la pou fòme estrikti siwo myel la */
        .honeycomb {
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Sa anpeche egzagon yo gen twòp espas anba ak anwo */
            padding-top: 15px; 
        }

        /* Chak ranje nan gwo egzagon an */
        .row {
            display: flex;
            justify-content: center;
            /* Sipèpoze ranje yo vètikalman pou fòme fòm siwo myel la */
            margin-top: -14px; 
        }

        /* Estil pou chak Egzagon (Gwosè optimize pou ekran telefòn) */
        .hexagon {
            width: 56px;
            height: 64px;
            background-color: #333;
            position: relative;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: bold;
            color: transparent; /* Kache nimewo a */
            cursor: pointer;
            transition: transform 0.2s, background-color 0.3s, color 0.3s;
            user-select: none;
            margin: 0 2px; /* Ti espas lateral ant egzagon yo */
        }

        .hexagon:active {
            transform: scale(0.9);
        }

        /* Lè yo klike sou li */
        .hexagon.flipped {
            color: white !important;
            background-color: var(--bg-color);
        }

        /* Lè pè a korèk */
        .hexagon.matched {
            background-color: var(--bg-color);
            color: white;
            pointer-events: none;
        }

        /* Lè moun nan pèdi */
        .hexagon.wrong {
            background-color: #d32f2f !important;
            color: white !important;
            animation: shake 0.3s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        /* Koulè dinamik pou 10 pè yo */
        .hexagon[data-value="10"] { --bg-color: #00bcd4; } 
        .hexagon[data-value="11"] { --bg-color: #ff9800; } 
        .hexagon[data-value="12"] { --bg-color: #4a148c; } 
        .hexagon[data-value="13"] { --bg-color: #e91e63; } 
        .hexagon[data-value="14"] { --bg-color: #2e7d32; } 
        .hexagon[data-value="15"] { --bg-color: #9c27b0; } 
        .hexagon[data-value="16"] { --bg-color: #ffeb3b; color: black !important; } 
        .hexagon[data-value="17"] { --bg-color: #03a9f4; } 
        .hexagon[data-value="18"] { --bg-color: #ff5722; } 
        .hexagon[data-value="19"] { --bg-color: #009688; } 

        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 0.9rem;
            background-color: #00bcd4;
            border: none;
            border-radius: 5px;
            color: black;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        button:hover {
            background-color: #008ba3;
        }
    </style>
</head>
<body>

    <h1>Egzagon Memwa</h1>
    <div id="status">Klike sou yon egzagon pou kòmanse!</div>

    <div class="honeycomb" id="honeycomb"></div>

    <button onclick="initGame()">Rekòmanse Jwèt la</button>

    <script>
        const itemValues = [
            10, 10, 11, 11, 12, 12, 13, 13, 14, 14, 
            15, 15, 16, 16, 17, 17, 18, 18, 19, 19
        ];
        
        let firstCard = null;
        let secondCard = null;
        let lockBoard = false;
        let matchesFound = 0;

        const honeycomb = document.getElementById('honeycomb');
        const statusText = document.getElementById('status');

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function initGame() {
            honeycomb.innerHTML = '';
            statusText.innerText = "Jwenn 10 pè yo nan gwo egzagon an!";
            statusText.style.color = "#ffeb3b";
            firstCard = null;
            secondCard = null;
            lockBoard = false;
            matchesFound = 0;

            const shuffledValues = shuffle([...itemValues]);

            // Defini konpòtman estrikti ranje yo (3, 4, 5, 5, 3) = 20 egzagon
            const rowSizes = [3, 4, 5, 5, 3];
            let itemIndex = 0;

            rowSizes.forEach(size => {
                const row = document.createElement('div');
                row.classList.add('row');

                for (let i = 0; i < size; i++) {
                    const value = shuffledValues[itemIndex];
                    
                    const hex = document.createElement('div');
                    hex.classList.add('hexagon');
                    hex.dataset.value = value;
                    hex.innerText = value;
                    hex.addEventListener('click', flipCard);
                    
                    row.appendChild(hex);
                    itemIndex++;
                }

                honeycomb.appendChild(row);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return; 

            this.classList.add('flipped');

            if (!firstCard) {
                firstCard = this;
                return;
            }

            secondCard = this;
            lockBoard = true;

            checkMatch();
        }

        function checkMatch() {
            let isMatch = firstCard.dataset.value === secondCard.dataset.value;

            if (isMatch) {
                disableCards();
            } else {
                gameOver();
            }
        }

        function disableCards() {
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            
            matchesFound += 2;
            if (matchesFound === itemValues.length) {
                statusText.innerText = "Magnifik! Ou genyen jwèt la! 🎉🏆";
                statusText.style.color = "#4caf50";
            } else {
                resetBoard();
            }
        }

        function gameOver() {
            statusText.innerText = `Ou pèdi! Ou klike sou ${firstCard.dataset.value} ak ${secondCard.dataset.value} ❌`;
            statusText.style.color = "#f44336";

            firstCard.classList.add('wrong');
            secondCard.classList.add('wrong');

            lockBoard = true; 
        }

        function resetBoard() {
            [firstCard, secondCard] = [null, null];
            lockBoard = false;
        }

        initGame();
    </script>

</body>
</html>
