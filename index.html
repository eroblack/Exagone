<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gwo Egzagon Memwa - Adoken 3D</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
        }

        h1 {
            margin: 0 0 5px 0;
            color: #00bcd4;
            font-size: 1.5rem;
            text-align: center;
        }

        .scoreboard {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }

        .score-box {
            background-color: #1e1e1e;
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid #333;
            font-size: 0.9rem;
            font-weight: bold;
        }

        #kredi-display {
            color: #4caf50;
        }
        
        #pè-display {
            color: #00bcd4;
        }

        #status {
            font-size: 1rem;
            margin-bottom: 15px;
            font-weight: bold;
            color: #ffeb3b;
            text-align: center;
            min-height: 24px;
            padding: 0 10px;
        }

        /* Veso prensipal siwo myel la */
        .honeycomb {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 10px;
            background-color: #0a0a0a; 
            padding: 20px;
            border-radius: 20px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        /* Chak ranje */
        .row {
            display: flex;
            justify-content: center;
            margin-top: -12px; 
            filter: drop-shadow(0px 4px 4px rgba(0, 0, 0, 0.6)); 
        }

        /* Estil Egzagon - Adoken */
        .hexagon {
            width: 58px;
            height: 66px;
            background: linear-gradient(135deg, #3a3a3a 0%, #222222 100%); 
            position: relative;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: bold;
            color: transparent; 
            cursor: pointer;
            transition: transform 0.2s, background 0.3s, color 0.3s;
            user-select: none;
            margin: 0 3px; 
        }

        .hexagon::before {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            right: 2px;
            bottom: 2px;
            background: inherit;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            opacity: 0.15;
            pointer-events: none;
        }

        .hexagon:active {
            transform: scale(0.9) translateY(2px);
        }

        /* Lè yo klike sou li */
        .hexagon.flipped {
            color: white !important;
            background: linear-gradient(135deg, var(--bg-light) 0%, var(--bg-color) 100%) !important;
        }

        /* Lè pè a korèk */
        .hexagon.matched {
            background: linear-gradient(135deg, var(--bg-light) 0%, var(--bg-color) 100%) !important;
            color: white;
            pointer-events: none;
        }

        /* Lè moun nan pèdi */
        .hexagon.wrong {
            background: linear-gradient(135deg, #ff5252 0%, #d32f2f 100%) !important;
            color: white !important;
            animation: shake 0.3s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        /* Koulè 10 pè yo */
        .hexagon[data-value="10"] { --bg-color: #00bcd4; --bg-light: #4dd0e1; } 
        .hexagon[data-value="11"] { --bg-color: #ff9800; --bg-light: #ffb74d; } 
        .hexagon[data-value="12"] { --bg-color: #4a148c; --bg-light: #7b1fa2; } 
        .hexagon[data-value="13"] { --bg-color: #e91e63; --bg-light: #f06292; } 
        .hexagon[data-value="14"] { --bg-color: #2e7d32; --bg-light: #4caf50; } 
        .hexagon[data-value="15"] { --bg-color: #9c27b0; --bg-light: #ba68c8; } 
        .hexagon[data-value="16"] { --bg-color: #ffeb3b; --bg-light: #fff176; color: black !important; } 
        .hexagon[data-value="17"] { --bg-color: #03a9f4; --bg-light: #4fc3f7; } 
        .hexagon[data-value="18"] { --bg-color: #ff5722; --bg-light: #ff8a65; } 
        .hexagon[data-value="19"] { --bg-color: #009688; --bg-light: #4db6ac; } 

        /* Custom Dialogue Box Modal */
        .modal {
            display: flex;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.85);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: #1e1e1e;
            padding: 25px;
            border-radius: 15px;
            border: 2px solid #00bcd4;
            text-align: center;
            max-width: 300px;
            width: 80%;
            box-shadow: 0 0 20px rgba(0,188,212,0.4);
        }

        .modal-content p {
            font-size: 1.1rem;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .btn-pay {
            background-color: #4caf50;
            color: white;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .btn-pay:hover {
            background-color: #43a047;
        }

        /* Bouton Rekòmanse anba a */
        .btn-restart {
            margin-top: 25px;
            padding: 10px 25px;
            font-size: 0.9rem;
            background-color: #00bcd4;
            border: none;
            border-radius: 5px;
            color: black;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .btn-restart:hover {
            background-color: #008ba3;
        }
    </style>
</head>
<body>

    <h1>Egzagon Memwa</h1>
    
    <div class="scoreboard">
        <div class="score-box">Pwi: <span id="kredi-display">500 Goud</span></div>
        <div class="score-box">Pè jwenn: <span id="pè-display">0 / 3</span></div>
    </div>

    <div id="status">Konfime peman an pou kapab jwe!</div>

    <div class="honeycomb" id="honeycomb"></div>

    <button class="btn-restart" onclick="nanmPemanDialogue()">Peze pou Reyi jwe</button>

    <!-- Custom Dialogue Box pou Peman 5 Goud la -->
    <div id="pemanModal" class="modal">
        <div class="modal-content">
            <p>Pou ou jwe pati sa a, ou dwe peye yon frè antre ki vo <strong>5 Goud</strong>.<br><br>Si ou jwenn 3 pè, ou genyen 500 Goud!</p>
            <button class="btn-pay" onclick="konfimeEtiPeye()">Wi, Peye 5 Goud</button>
        </div>
    </div>

    <script>
        const itemValues = [
            10, 10, 11, 11, 12, 12, 13, 13, 14, 14, 
            15, 15, 16, 16, 17, 17, 18, 18, 19, 19
        ];
        
        let firstCard = null;
        let secondCard = null;
        let lockBoard = true; // Bloke tablo a toutotan li pa peye
        let matchesFound = 0;

        const honeycomb = document.getElementById('honeycomb');
        const statusText = document.getElementById('status');
        const krediDisplay = document.getElementById('kredi-display');
        const pèDisplay = document.getElementById('pè-display');
        const pemanModal = document.getElementById('pemanModal');

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        // Louvri bwat dyalòg la
        function nanmPemanDialogue() {
            pemanModal.style.display = "flex";
            lockBoard = true;
            statusText.innerText = "Konfime peman an pou kapab jwe!";
            statusText.style.color = "#ffeb3b";
        }

        // Lè jwè a klike sou bouton "Wi, Peye 5 Goud"
        function konfimeEtiPeye() {
            pemanModal.style.display = "none";
            lockBoard = false; // Debloke jwèt la
            initGame();
        }

        function initGame() {
            honeycomb.innerHTML = '';
            statusText.innerText = "Jwèt la debloke! Jwenn 3 pè san fè erè.";
            statusText.style.color = "#ffeb3b";
            krediDisplay.innerText = "500 Goud";
            krediDisplay.style.color = "#4caf50";
            pèDisplay.innerText = "0 / 3";
            
            firstCard = null;
            secondCard = null;
            matchesFound = 0;

            const shuffledValues = shuffle([...itemValues]);
            const rowSizes = [3, 4, 5, 5, 3];
            let itemIndex = 0;

            rowSizes.forEach(size => {
                const row = document.createElement('div');
                row.classList.add('row');

                for (let i = 0; i < size; i++) {
                    const value = shuffledValues[itemIndex];
                    
                    const hex = document.createElement('div');
                    hex.classList.add('hexagon');
                    hex.dataset.value = value;
                    hex.innerText = value;
                    hex.addEventListener('click', flipCard);
                    
                    row.appendChild(hex);
                    itemIndex++;
                }

                honeycomb.appendChild(row);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return; 

            this.classList.add('flipped');

            if (!firstCard) {
                firstCard = this;
                return;
            }

            secondCard = this;
            lockBoard = true;

            checkMatch();
        }

        function checkMatch() {
            let isMatch = firstCard.dataset.value === secondCard.dataset.value;

            if (isMatch) {
                disableCards();
            } else {
                gameOver();
            }
        }

        function disableCards() {
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            
            matchesFound += 2;
            let pèKounye a = matchesFound / 2;
            pèDisplay.innerText = `${pèKounye a} / 3`;

            // SI LI JWENN 3 PÈ (LI GENYEN OTOMATIKMAN)
            if (pèKounye a === 3) {
                statusText.innerText = "Felisitasyon! Ou jwenn 3 pè san fè erè! Ou genyen 500 Goud! 🏆💰";
                statusText.style.color = "#4caf50";
                lockBoard = true; // Bloke tablo a paske li fin genyen
            } else {
                resetBoard();
            }
        }

        function gameOver() {
            statusText.innerText = `Ou pèdi! Ou klike sou ${firstCard.dataset.value} ak ${secondCard.dataset.value} ❌`;
            statusText.style.color = "#f44336";
            
            krediDisplay.innerText = "0 Goud";
            krediDisplay.style.color = "#f44336";

            firstCard.classList.add('wrong');
            secondCard.classList.add('wrong');

            lockBoard = true; 
        }

        function resetBoard() {
            [firstCard, secondCard] = [null, null];
            lockBoard = false;
        }

        // Lè paj la louvri pou premye fwa, mande peman an dirèk
        nanmPemanDialogue();
    </script>

</body>
</html>
