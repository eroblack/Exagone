<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 EGZAGON MEMORY PAY 5 GOUD 🔥</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
overflow:hidden;
padding:20px;

background:
linear-gradient(-45deg,
#000000,
#071b2b,
#00151f,
#16001f,
#000000);

background-size:400% 400%;
animation:bgMove 10s ease infinite;
color:white;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

h1{
font-size:2rem;
margin-bottom:20px;
text-align:center;
color:#00e5ff;

text-shadow:
0 0 10px #00e5ff,
0 0 25px #00ffff;

animation:titleGlow 2s infinite alternate;
}

@keyframes titleGlow{
from{
transform:scale(1);
}
to{
transform:scale(1.05);
}
}

.surface{

padding:25px;
border-radius:30px;

background:
rgba(255,255,255,0.05);

backdrop-filter:blur(12px);

border:1px solid rgba(255,255,255,0.1);

box-shadow:
0 0 40px rgba(0,229,255,0.25),
inset 0 0 20px rgba(255,255,255,0.05);

display:flex;
flex-direction:column;
align-items:center;

max-width:450px;
width:100%;
}

.scoreboard{
display:flex;
gap:15px;
margin-bottom:20px;
flex-wrap:wrap;
justify-content:center;
}

.score{
padding:12px 18px;
border-radius:15px;

background:
rgba(255,255,255,0.07);

border:1px solid #00e5ff;

box-shadow:
0 0 15px rgba(0,229,255,0.2);

font-weight:bold;
}

#status{
margin-bottom:20px;
font-size:1rem;
font-weight:bold;
color:#fff176;
text-align:center;
min-height:30px;
}

.board{
display:flex;
flex-direction:column;
align-items:center;
margin-top:10px;
}

.row{
display:flex;
margin-top:-18px;
}

.row:first-child{
margin-top:0;
}

/* HEXAGON */

.hex{
width:95px;
height:105px;
margin:6px;

clip-path:polygon(
50% 0%,
100% 25%,
100% 75%,
50% 100%,
0% 75%,
0% 25%
);

display:flex;
justify-content:center;
align-items:center;

font-size:2rem;
font-weight:bold;

cursor:pointer;
user-select:none;

position:relative;

transition:0.3s;

background-size:300% 300%;
animation:colorFlow 6s ease infinite;

box-shadow:
0 0 20px rgba(0,0,0,0.5),
0 0 20px rgba(255,255,255,0.15),
inset 0 0 20px rgba(255,255,255,0.08);

}

/* KOULÈ */

.hex:nth-child(1n){
background:
linear-gradient(-45deg,
#ff1744,
#ff9100,
#ffea00,
#ff1744);
}

.hex:nth-child(2n){
background:
linear-gradient(-45deg,
#00e5ff,
#2979ff,
#651fff,
#00e5ff);
}

.hex:nth-child(3n){
background:
linear-gradient(-45deg,
#00ff99,
#00c853,
#64dd17,
#00ff99);
}

.hex:nth-child(4n){
background:
linear-gradient(-45deg,
#ff00ff,
#d500f9,
#651fff,
#ff00ff);
}

@keyframes colorFlow{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.hex:hover{
transform:
scale(1.08)
rotate(2deg);

box-shadow:
0 0 25px #00e5ff,
0 0 50px rgba(255,255,255,0.25);
}

.hex.flip{
animation:flip 0.4s;
}

@keyframes flip{
0%{
transform:rotateY(0deg);
}
100%{
transform:rotateY(180deg);
}
}

.hex.match{
animation:matchGlow 1s infinite alternate;
pointer-events:none;
}

@keyframes matchGlow{
from{
box-shadow:0 0 10px #00ff99;
}
to{
box-shadow:0 0 35px #00ff99;
}
}

.hex.wrong{
background:#ff1744 !important;
animation:shake 0.3s;
}

@keyframes shake{
0%,100%{
transform:translateX(0);
}
25%{
transform:translateX(-5px);
}
75%{
transform:translateX(5px);
}
}

button{
margin-top:25px;
padding:14px 30px;
border:none;
border-radius:15px;

background:
linear-gradient(45deg,#00e5ff,#00ff99);

color:black;

font-size:1rem;
font-weight:bold;

cursor:pointer;

box-shadow:
0 0 20px rgba(0,229,255,0.5);

transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.win{
color:#00ff99 !important;
}

.lose{
color:#ff5252 !important;
}

/* DIALOG */

.dialog-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);

display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

.dialog{
width:320px;
