<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Egzagon Memwa PRO</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:
linear-gradient(-45deg,#000,#111,#001a1f,#000);
background-size:400% 400%;
animation:bgmove 10s ease infinite;
font-family:Arial,sans-serif;
color:white;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
overflow:hidden;
padding:10px;
}

@keyframes bgmove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

h1{
font-size:2rem;
margin-bottom:10px;
color:#00e5ff;
text-shadow:0 0 15px #00e5ff;
}

.scoreboard{
display:flex;
gap:15px;
margin-bottom:15px;
flex-wrap:wrap;
justify-content:center;
}

.score-box{
background:#111;
padding:10px 20px;
border-radius:20px;
border:1px solid #00e5ff;
box-shadow:0 0 10px rgba(0,229,255,0.4);
font-weight:bold;
}

#status{
margin-bottom:20px;
font-weight:bold;
font-size:1rem;
text-align:center;
color:#fff176;
min-height:30px;
}

.honeycomb{
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
border-radius:20px;
background:rgba(255,255,255,0.03);
backdrop-filter:blur(5px);
box-shadow:0 0 30px rgba(0,229,255,0.15);
}

.row{
display:flex;
margin-top:-12px;
}

.hexagon{
width:65px;
height:74px;
margin:3px;
clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
background:linear-gradient(145deg,#333,#111);
display:flex;
justify-content:center;
align-items:center;
font-size:1.4rem;
font-weight:bold;
color:transparent;
cursor:pointer;
transition:0.3s;
position:relative;
transform-style:preserve-3d;
box-shadow:
0 0 10px rgba(0,0,0,0.5),
inset 0 0 10px rgba(255,255,255,0.05);
}

.hexagon:hover{
transform:scale(1.05);
}

.hexagon.flipped{
animation:flip 0.4s;
color:white;
}

@keyframes flip{
0%{transform:rotateY(0deg);}
100%{transform:rotateY(180deg);}
}

.hexagon.matched{
animation:glow 1s infinite alternate;
pointer-events:none;
}

@keyframes glow{
from{
box-shadow:0 0 10px #00ff99;
}
to{
box-shadow:0 0 25px #00ff99;
}
}

.hexagon.wrong{
background:#ff1744 !important;
color:white !important;
animation:shake 0.3s;
}

@keyframes shake{
0%,100%{transform:translateX(0);}
25%{transform:translateX(-5px);}
75%{transform:translateX(5px);}
}

.hexagon[data-value="10"]{background:#00bcd4;}
.hexagon[data-value="11"]{background:#ff9800;}
.hexagon[data-value="12"]{background:#9c27b0;}
.hexagon[data-value="13"]{background:#e91e63;}
.hexagon[data-value="14"]{background:#4caf50;}
.hexagon[data-value="15"]{background:#3f51b5;}
.hexagon[data-value="16"]{background:#ffeb3b;color:black!important;}
.hexagon[data-value="17"]{background:#03a9f4;}
.hexagon[data-value="18"]{background:#ff5722;}
.hexagon[data-value="19"]{background:#009688;}

.btn-restart{
margin-top:25px;
padding:12px 30px;
border:none;
border-radius:10px;
background:#00e5ff;
color:black;
font-weight:bold;
font-size:1rem;
cursor:pointer;
box-shadow:0 0 15px #00e5ff;
transition:0.3s;
}

.btn-restart:hover{
transform:scale(1.05);
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

.modal-content{
background:#111;
padding:30px;
border-radius:20px;
text-align:center;
width:90%;
max-width:350px;
border:2px solid #00e5ff;
box-shadow:0 0 30px rgba(0,229,255,0.5);
animation:pop 0.4s;
}

@keyframes pop{
0%{transform:scale(0.5);}
100%{transform:scale(1);}
}

.modal-content h2{
margin-bottom:15px;
color:#00e5ff;
}

.modal-content p{
margin-bottom:20px;
line-height:1.5;
}

.btn-pay{
padding:12px 30px;
border:none;
border-radius:10px;
background:#00ff99;
color:black;
font-size:1rem;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 15px #00ff99;
}

.win{
color:#00ff99 !important;
}

.lose{
color:#ff1744 !important;
}

</style>
</head>

<body>

<h1>🔥 Egzagon Memwa PRO 🔥</h1>

<div class="scoreboard">
<div class="score-box">
💰 Pwi:
<span id="kredi-display">500 Goud</span>
</div>

<div class="score-box">
🏆 Pè:
<span id="pè-display">0 / 3</span>
</div>
</div>

<div id="status">
Konfime peman pou kòmanse jwèt la
</div>

<div class="honeycomb" id="honeycomb"></div>

<button class="btn-restart" onclick="showPayment()">
🔄 Rekòmanse
</button>

<!-- MODAL -->

<div class="modal" id="paymentModal">

<div class="modal-content">

<h2>💎 Peman Obligatwa</h2>

<p>
Peye <b>5 Goud</b> pou antre nan jwèt la.<br><br>

Si ou jwenn <b>3 pè</b> san erè,
ou genyen <b>500 Goud</b> 🏆
</p>

<button class="btn-pay" onclick="payNow()">
Peye 5 Goud
</button>

</div>
</div>

<!-- AUDIO -->

<audio id="clickSound">
<source src="https://assets.mixkit.co/sfx/preview/mixkit-select-click-1109.mp3">
</audio>

<audio id="winSound">
<source src="https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3">
</audio>

<audio id="loseSound">
<source src="https://assets.mixkit.co/sfx/preview/mixkit-player-losing-or-failing-2042.mp3">
</audio>

<script>

const values = [
10,10,
11,11,
12,12,
13,13,
14,14,
15,15,
16,16,
17,17,
18,18,
19,19
];

const honeycomb = document.getElementById("honeycomb");
const statusText = document.getElementById("status");
const paymentModal = document.getElementById("paymentModal");
const krediDisplay = document.getElementById("kredi-display");
const pairDisplay = document.getElementById("pè-display");

const clickSound = document.getElementById("clickSound");
const winSound = document.getElementById("winSound");
const loseSound = document.getElementById("loseSound");

let firstCard = null;
let secondCard = null;
let lockBoard = true;
let pairs = 0;

function shuffle(array){
return array.sort(()=>Math.random()-0.5);
}

function showPayment(){
paymentModal.style.display="flex";
lockBoard=true;
}

function payNow(){

paymentModal.style.display="none";

statusText.innerHTML="🔥 Jwèt la kòmanse!";
statusText.className="";

lockBoard=false;

initGame();
}

function initGame(){

honeycomb.innerHTML="";

firstCard=null;
secondCard=null;
pairs=0;

pairDisplay.innerHTML="0 / 3";

const shuffled = shuffle([...values]);

const rows=[3,4,5,5,3];

let index=0;

rows.forEach(size=>{

const row=document.createElement("div");
row.classList.add("row");

for(let i=0;i<size;i++){

const value=shuffled[index];

const hex=document.createElement("div");

hex.classList.add("hexagon");
hex.dataset.value=value;
hex.innerHTML=value;

hex.addEventListener("click",flipCard);

row.appendChild(hex);

index++;
}

honeycomb.appendChild(row);

});

}

function flipCard(){

if(lockBoard) return;

if(this===firstCard) return;

clickSound.play();

this.classList.add("flipped");

if(!firstCard){

firstCard=this;
return;

}

secondCard=this;

lockBoard=true;

checkMatch();

}

function checkMatch(){

const match=
firstCard.dataset.value===
secondCard.dataset.value;

if(match){

firstCard.classList.add("matched");
secondCard.classList.add("matched");

pairs++;

pairDisplay.innerHTML=
pairs+" / 3";

resetBoard();

if(pairs===3){

statusText.innerHTML=
"🏆 Ou genyen 500 Goud!";
statusText.className="win";

winSound.play();

lockBoard=true;

}

}else{

firstCard.classList.add("wrong");
secondCard.classList.add("wrong");

statusText.innerHTML=
"❌ Ou pèdi jwèt la";

statusText.className="lose";

krediDisplay.innerHTML="0 Goud";

loseSound.play();

lockBoard=true;

}

}

function resetBoard(){

[firstCard,secondCard]=[null,null];

lockBoard=false;

}

showPayment();

</script>

</body>
</html>
